{% extends "base.html" %}

{% block title %}{{ profile_user.first_name }}'s QR Code - Findly{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="card shadow-sm border-0 pt-4 pb-3 px-3">
            <img src="https://ui-avatars.com/api/?name={{ profile_user.first_name|default:profile_user.email }}&background=random" class="rounded-circle mx-auto mb-3 shadow-sm border border-light border-3" style="width: 100px; height: 100px; z-index: 10; margin-bottom: -50px;" alt="Avatar">
            
            <div class="card-body bg-light rounded pt-5 pb-4 px-4 text-center border mt-2">
                <h4 class="mb-1">{{ profile_user.first_name }} {{ profile_user.last_name }}</h4>
                <p class="text-muted small mb-4">{{ profile_user.email }}</p>

                <!-- Since actual generation handles only item QR codes in the views natively, we just show a static placeholder or call the api -->
                <div class="bg-white p-3 rounded shadow-sm d-inline-block border">
                    <!-- Basic QR code generation endpoint (placeholder image showing logic concept) -->
                    <!-- Natively you'd need a similar user_qr_png view. We use a generic image for demo -->
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{ request.build_absolute_uri }}" alt="QR Code" class="img-fluid" width="200">
                </div>
                
                <p class="mt-4 mb-2 small text-muted">Scan to view user profile and reviews.</p>
                <a href="{% url 'reviews:user' profile_user.pk %}" class="btn btn-outline-primary btn-sm rounded-pill px-4"><i class="bi bi-person"></i> View Profile</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
