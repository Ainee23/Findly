{% extends "base.html" %}

{% block title %}Delete Item - Findly{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-5">
        <div class="card shadow border-danger border-2 text-center py-4 px-3 rounded-4">
            <div class="mb-3">
                <i class="bi bi-exclamation-octagon-fill text-danger" style="font-size:4rem;"></i>
            </div>
            <h4 class="fw-bold mb-3">Delete Item?</h4>
            <p class="text-muted mb-4 px-lg-4 text-center">
                Are you sure you want to permanently delete <strong>"{{ item.title }}"</strong>?<br>
                <small>This action cannot be undone and will delete all associated data.</small>
            </p>
            
            <form method="POST" class="d-flex flex-wrap gap-3 justify-content-center">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-semibold px-4 flex-grow-1" style="max-width:200px;">
                    <i class="bi bi-trash-fill me-1"></i> Yes, Delete
                </button>
                <a href="{% url 'items:detail' item.pk %}" class="btn btn-outline-secondary btn-lg rounded-pill fw-semibold px-4 flex-grow-1" style="max-width:200px;">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
