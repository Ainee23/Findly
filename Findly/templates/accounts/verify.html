{% extends "base.html" %}
{% load static %}

{% block title %}Verify OTP - Findly{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-5 text-center">
                <div class="mb-4 text-primary">
                    <i class="bi bi-shield-check" style="font-size: 3rem;"></i>
                </div>
                <h3 class="mb-2">Verify Login</h3>
                <p class="text-muted mb-4 text-sm">We've sent a 6-digit One-Time Password to your email address.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4 text-start">
                        <label class="form-label" for="otp">Security Code (OTP)</label>
                        <input type="text" name="otp" id="otp" placeholder="Enter 6-digit code" required autofocus autocomplete="one-time-code" maxlength="6" pattern="\d{6}">
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Verify & Login</button>
                    </div>
                </form>

                <p class="mt-4 mb-0 text-muted">Didn't receive it? <a href="{% url 'accounts:login' %}" class="text-decoration-none">Back to login</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    form input[name="otp"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        background-color: #f8f9fa;
        text-align: center;
        letter-spacing: 0.25rem;
        font-size: 1.25rem;
        font-weight: 600;
        color: #495057;
    }
    form input[name="otp"]:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 .25rem rgba(13,110,253,.25);
        background-color: #ffffff;
    }
</style>
{% endblock %}
