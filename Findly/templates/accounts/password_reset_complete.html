{% extends "base.html" %}

{% block title %}Password Reset Complete - Findly{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-5 text-center">
                <div class="mb-4 text-success">
                    <i class="fas fa-check-circle fa-4x"></i>
                </div>
                <h3 class="mb-3">Password reset complete</h3>
                <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
                
                <div class="mt-4">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg w-100">Log in</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
