{% extends "base.html" %}

{% block title %}Home | Findly{% endblock %}

{% block content %}
<div class="relative min-h-[75vh] flex items-center justify-center overflow-hidden rounded-3xl pb-16">
    <!-- Animated Gradient Background Orbs -->
    <div class="absolute inset-0 bg-indigo-50/30 dark:bg-gray-900 rounded-3xl overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-gradient-to-r from-[#6C63FF] to-[#00C9FF] opacity-30 blur-[100px] animate-[pulse_4s_cubic-bezier(0.4,0,0.6,1)_infinite]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-gradient-to-r from-[#00C9FF] to-[#6C63FF] opacity-30 blur-[100px] animate-[pulse_4s_cubic-bezier(0.4,0,0.6,1)_infinite]" style="animation-delay: 2s;"></div>
    </div>

    <!-- Hero Content -->
    <div class="glass-card max-w-4xl mx-auto text-center px-8 py-16 sm:px-12 sm:py-20 relative z-10 w-full mt-10">
        <h1 class="text-5xl sm:text-6xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#6C63FF] to-[#00C9FF] tracking-tight mb-6 leading-tight pb-2">
            Lost something? <br class="hidden sm:block"> Find it with AI.
        </h1>
        
        <p class="mt-4 text-[1.15rem] sm:text-lg text-gray-600 dark:text-gray-300 mb-10 font-medium tracking-wide">
            Upload details <span class="mx-2 text-indigo-400">→</span> AI matches <span class="mx-2 text-indigo-400">→</span> Connect safely
        </p>

        <div class="flex flex-col sm:flex-row justify-center items-center gap-4 sm:gap-6">
            <a href="{% url 'items:create' %}?type=lost" class="btn-gradient px-8 py-4 sm:px-10 text-[1.1rem] flex items-center justify-center w-full sm:w-auto shadow-lg hover:shadow-indigo-500/30 transition-shadow">
                <i class="bi bi-search mr-3 text-xl"></i> Report Lost Item
            </a>
            <a href="{% url 'items:create' %}?type=found" class="glass-card px-8 py-4 sm:px-10 text-[1.1rem] font-semibold text-gray-800 dark:text-white border-2 border-indigo-100 dark:border-gray-700 hover:bg-white/50 dark:hover:bg-gray-800/50 flex items-center justify-center w-full sm:w-auto transition-all">
                <i class="bi bi-box mr-3 text-xl text-[#00C9FF]"></i> Report Found Item
            </a>
        </div>
    </div>
</div>
{% endblock %}
